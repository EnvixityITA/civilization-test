<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2.5D Civilization Simulator</title>

<style>

body{
background:#0e0e0e;
color:white;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}

#world{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%) rotateX(60deg);
display:grid;
grid-template-columns:repeat(60,20px);
}

.tile{

width:20px;
height:20px;

transform-style:preserve-3d;

}

.block{

width:100%;
height:100%;

box-shadow:0 0 2px black;

}

</style>
</head>

<body>

<h2>2.5D Civilization Simulator</h2>

<div id="world"></div>

<script>

const SIZE=60

const world=[]
const civs=[]

const worldDiv=document.getElementById("world")

function randomColor(){

return "hsl("+Math.random()*360+",70%,55%)"

}

// create civs

for(let i=0;i<6;i++){

civs.push({
id:i,
color:randomColor()
})

}

// generate map

for(let y=0;y<SIZE;y++){

world[y]=[]

for(let x=0;x<SIZE;x++){

const tile=document.createElement("div")
tile.className="tile"

const block=document.createElement("div")
block.className="block"

tile.appendChild(block)

worldDiv.appendChild(tile)

world[y][x]={

height:Math.random(),
owner:null,
el:block

}

}

}

// spawn civs

for(let i=0;i<civs.length;i++){

let x=Math.floor(Math.random()*SIZE)
let y=Math.floor(Math.random()*SIZE)

world[y][x].owner=i

}

// simulation

function step(){

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

const tile=world[y][x]

if(tile.owner!=null){

expand(x,y)

}

}
}

draw()

}

// expansion

function expand(x,y){

const dirs=[[1,0],[-1,0],[0,1],[0,-1]]

const d=dirs[Math.floor(Math.random()*4)]

const nx=x+d[0]
const ny=y+d[1]

if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) return

const from=world[y][x]
const target=world[ny][nx]

if(target.owner==null){

target.owner=from.owner

}

else if(target.owner!=from.owner){

if(Math.random()<0.3){

target.owner=from.owner

}

}

}

// draw

function draw(){

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

const tile=world[y][x]

if(tile.owner==null){

tile.el.style.background="#2f5e2f"

}else{

tile.el.style.background=civs[tile.owner].color

}

}

}

}

setInterval(step,150)

</script>

</body>
</html>
