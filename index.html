<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Simulator</title>

<style>

body{
margin:0;
background:#111;
overflow:hidden;
}

canvas{
display:block;
image-rendering:pixelated;
}

</style>
</head>

<body>

<canvas id="world"></canvas>

<script>

const SIZE = 800   // mappa molto grande
const canvas = document.getElementById("world")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let zoom = 3
let camX = 0
let camY = 0

const map=[]
const civs=[]

function rand(a,b){
return Math.random()*(b-a)+a
}

function color(){
return "hsl("+rand(0,360)+",70%,55%)"
}

/* genera terreno */

for(let y=0;y<SIZE;y++){

map[y]=[]

for(let x=0;x<SIZE;x++){

let r=Math.random()

let type="water"

if(r>0.35) type="grass"
if(r>0.70) type="forest"
if(r>0.90) type="mountain"

map[y][x]={

type:type,
owner:null,
pop:0

}

}

}

/* civiltà */

for(let i=0;i<10;i++){

civs.push({
color:color()
})

spawn(i)

}

function spawn(id){

let placed=false

while(!placed){

let x=Math.floor(rand(0,SIZE))
let y=Math.floor(rand(0,SIZE))

if(map[y][x].type=="grass"){

map[y][x].owner=id
map[y][x].pop=50
placed=true

}

}

}

/* simulazione */

function step(){

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

let t=map[y][x]

if(t.owner!=null){

t.pop+=Math.random()*1.5

let speed=0.02

if(t.type=="forest") speed=0.005

if(t.pop>30 && Math.random()<speed){

expand(x,y)

}

}

}
}

}

function expand(x,y){

let dirs=[[1,0],[-1,0],[0,1],[0,-1]]
let d=dirs[Math.floor(rand(0,4))]

let nx=x+d[0]
let ny=y+d[1]

if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) return

let from=map[y][x]
let to=map[ny][nx]

if(to.type=="water") return
if(to.type=="mountain") return

if(to.owner==null){

to.owner=from.owner
to.pop=10

}
else if(to.owner!=from.owner){

if(Math.random()<0.2){

to.owner=from.owner
to.pop=10

}

}

}

/* disegno */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

let tilesX=Math.ceil(canvas.width/zoom)
let tilesY=Math.ceil(canvas.height/zoom)

for(let y=0;y<tilesY;y++){
for(let x=0;x<tilesX;x++){

let mx=Math.floor(x+camX)
let my=Math.floor(y+camY)

if(mx<0||my<0||mx>=SIZE||my>=SIZE) continue

let t=map[my][mx]

let col="#000"

if(t.type=="water") col="#2a5f9e"
if(t.type=="grass") col="#3fa34d"
if(t.type=="forest") col="#2e6e3e"
if(t.type=="mountain") col="#777"

if(t.owner!=null){

col=civs[t.owner].color

}

ctx.fillStyle=col

ctx.fillRect(
x*zoom,
y*zoom,
zoom,
zoom
)

}
}

}

/* zoom */

canvas.addEventListener("wheel",e=>{

if(e.deltaY>0) zoom*=0.9
else zoom*=1.1

zoom=Math.max(1,Math.min(20,zoom))

})

/* movimento camera */

let dragging=false
let lastX,lastY

canvas.addEventListener("mousedown",e=>{
dragging=true
lastX=e.clientX
lastY=e.clientY
})

canvas.addEventListener("mouseup",()=>dragging=false)

canvas.addEventListener("mousemove",e=>{

if(dragging){

camX-=(e.clientX-lastX)/zoom
camY-=(e.clientY-lastY)/zoom

lastX=e.clientX
lastY=e.clientY

}

})

/* loop */

function loop(){

step()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
