<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini World Simulator</title>

<style>

body{
background:#111;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
border:2px solid black;
image-rendering:pixelated;
}

</style>
</head>

<body>

<h2>Mini World Simulator</h2>

<canvas id="world"></canvas>

<script>

const SIZE = 200
const TILE = 4

const canvas=document.getElementById("world")
const ctx=canvas.getContext("2d")

canvas.width=SIZE
canvas.height=SIZE
canvas.style.width=(SIZE*TILE)+"px"
canvas.style.height=(SIZE*TILE)+"px"

const map=[]
const civs=[]

function randomColor(){
return "hsl("+Math.random()*360+",70%,55%)"
}

const NAMES=[
"Arkon","Belvar","Zerin","Torak",
"Luneth","Valdor","Kareth","Noran"
]

/* generate terrain */

for(let y=0;y<SIZE;y++){

map[y]=[]

for(let x=0;x<SIZE;x++){

let r=Math.random()

let type="water"

if(r>0.35) type="grass"
if(r>0.75) type="forest"

map[y][x]={
type:type,
owner:null,
pop:0,
city:false
}

}

}

/* create civilizations */

for(let i=0;i<6;i++){

civs.push({
id:i,
color:randomColor(),
name:NAMES[Math.floor(Math.random()*NAMES.length)]
})

spawnCiv(i)

}

function spawnCiv(id){

let placed=false

while(!placed){

let x=Math.floor(Math.random()*SIZE)
let y=Math.floor(Math.random()*SIZE)

if(map[y][x].type!="water"){

map[y][x].owner=id
map[y][x].pop=50
map[y][x].city=true

placed=true

}

}

}

/* simulation */

function step(){

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

let tile=map[y][x]

if(tile.owner!=null){

tile.pop+=Math.random()*2

if(tile.pop>20){
expand(x,y)
}

if(tile.pop>80 && Math.random()<0.002){
tile.city=true
}

}

}
}

}

/* expansion */

function expand(x,y){

let dirs=[
[1,0],[-1,0],[0,1],[0,-1]
]

let d=dirs[Math.floor(Math.random()*4)]

let nx=x+d[0]
let ny=y+d[1]

if(nx<0||ny<0||nx>=SIZE||ny>=SIZE) return

let from=map[y][x]
let target=map[ny][nx]

if(target.type=="water") return

if(target.owner==null){

target.owner=from.owner
target.pop=10

}
else if(target.owner!=from.owner){

if(Math.random()<0.2){

target.owner=from.owner
target.pop=10

}

}

}

/* draw */

function draw(){

for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

let tile=map[y][x]

if(tile.type=="water") ctx.fillStyle="#2a5f9e"
if(tile.type=="grass") ctx.fillStyle="#3fa34d"
if(tile.type=="forest") ctx.fillStyle="#2e6e3e"

ctx.fillRect(x,y,1,1)

if(tile.owner!=null){

ctx.fillStyle=civs[tile.owner].color
ctx.fillRect(x,y,1,1)

}

if(tile.city){

ctx.fillStyle="white"
ctx.fillRect(x,y,1,1)

}

}
}

}

function loop(){

step()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
